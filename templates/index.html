<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบค้นหาภาพถ่ายใบหน้า</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white p-6 rounded-lg shadow-md text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-6">📸 ค้นหารูปภาพโรงเรียนด้วยใบหน้า</h1>
            
            <form action="/" method="POST" enctype="multipart/form-data" class="space-y-4">
                <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-gray-50">
                    <input type="file" name="search_face" accept="image/*" required class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition">🔍 เริ่มค้นหาใบหน้า</button>
            </form>
        </div>

        {% if matched_photos %}
        <div class="mt-10">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">✨ พบรูปภาพของคุณในกิจกรรม:</h2>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                {% for photo in matched_photos %}
                <div class="bg-white p-2 rounded shadow">
                    <img src="{{ url_for('static', filename='photos/' + photo) }}" class="rounded w-full h-auto object-cover aspect-square">
                </div>
                {% endfor %}
            </div>
        </div>
        {% elif request.method == 'POST' %}
        <p class="text-center text-gray-500 mt-10">❌ ไม่พบภาพใบหน้าของคุณในคลังระบบ</p>
        {% endif %}
    </div>
</body>
</html>
