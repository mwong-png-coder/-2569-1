<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ AI ค้นหาภาพถ่ายใบหน้าแม่นยำสูง</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div class="max-w-3xl mx-auto py-10 px-4">
        <div class="bg-white p-6 rounded-lg shadow-md text-center">
            <h1 class="text-2xl font-bold text-gray-800 mb-2">📸 ระบบ AI ค้นหารูปภาพด้วยใบหน้า</h1>
            <p class="text-sm text-gray-500 mb-6">⚙️ โหมดพิเศษ: เอียงคอ หันข้าง หรือเห็นหน้าครึ่งซีกก็หาเจอ</p>
            
            <div id="loading-ai" class="mb-4 text-blue-600 font-medium">⏳ กำลังเตรียมความพร้อมระบบ AI บนเบราว์เซอร์...</div>

            <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 bg-gray-50 mb-4">
                <input type="file" id="search_face" accept="image/*" disabled class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100"/>
            </div>
            <button id="search-btn" disabled class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition disabled:bg-gray-400">🔍 เริ่มให้ AI สแกนค้นหาใบหน้า</button>
        </div>

        <div id="status-text" class="text-center text-gray-600 mt-6 hidden"></div>

        <div id="result-section" class="mt-10 hidden">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">✨ พบรูปภาพของคุณในกิจกรรม (วิเคราะห์ด้วย AI):</h2>
            <div id="grid-photos" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
        </div>
    </div>

    <script>
        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
        let allPhotos = [];

        // 1. โหลดโมเดลตัวท็อป SSD Mobilenet V1 เพื่อความละเอียดของพิกเซลสูงสุด
        async function initAI() {
            try {
                document.getElementById('loading-ai').innerText = '⏳ กำลังเปิดระบบ AI ตรวจจับความละเอียดสูง (SSD)...';
                await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                
                document.getElementById('loading-ai').innerText = '✅ ระบบ AI ตัวท็อปพร้อมประมวลผลค้นหาใบหน้าแล้ว!';
                document.getElementById('search_face').disabled = false;
                document.getElementById('search-btn').disabled = false;

                const res = await fetch('/api/photos');
                allPhotos = await res.json();
            } catch (e) {
                document.getElementById('loading-ai').innerText = '❌ โหลดโมเดลล้มเหลว กรุณารีเฟรชหน้าเว็บอีกครั้งครับ';
            }
        }

        document.getElementById('search-btn').addEventListener('click', async () => {
            const fileInput = document.getElementById('search_face');
            if (!fileInput.files.length) return alert('กรุณาเลือกไฟล์ภาพถ่ายใบหน้าก่อนครับนาย');

            const statusText = document.getElementById('status-text');
            const gridPhotos = document.getElementById('grid-photos');
            const resultSection = document.getElementById('result-section');

            statusText.classList.remove('hidden');
            resultSection.classList.add('hidden');
            gridPhotos.innerHTML = '';

            statusText.innerText = '⏳ AI กำลังสกัดและวิเคราะห์เวกเตอร์ใบหน้าต้นฉบับของคุณ...';
            
            const targetImg = await faceapi.bufferToImage(fileInput.files[0]);
            
            // อ่านใบหน้าต้นฉบับด้วยความแม่นยำสูงสุด
            const targetDetection = await faceapi.detectSingleFace(
                targetImg, 
                new faceapi.SsdMobilenetv1Options({ minConfidence: 0.4 })
            ).withFaceLandmarks().withFaceDescriptor();

            if (!targetDetection) {
                statusText.innerText = '❌ AI ตรวจไม่พบใบหน้าในรูปต้นฉบับที่อัปโหลด กรุณาใช้รูปที่เห็นหน้าตรงชัดเจนเป็นหัวเชื้อครับ';
                return;
            }

            // ตั้งค่าเกณฑ์เปรียบเทียบใบหน้าที่ 0.50 (ค่าสมดุลที่สุดสำหรับโมเดล SSD: ป้องกันรูปคนอื่นหลุด และดึงรูปเราได้ครบ)
            const faceMatcher = new faceapi.FaceMatcher(targetDetection, 0.50);
            let matchCount = 0;

            statusText.innerText = `🔄 ระบบกำลังนำข้อมูลใบหน้าไปไล่สแกนรูปในคลังภาพทั้งหมด (${allPhotos.length} รูป)...`;

            for (let photo of allPhotos) {
                try {
                    const imgUrl = `/static/photos/${photo}`;
                    const currentImg = await faceapi.fetchImage(imgUrl);
                    
                    // ใช้โมเดลความละเอียดสูงเจาะค้นหาทุกใบหน้าในห้องเรียน
                    // ตั้งค่า minConfidence ไว้ที่ 0.25 เพื่อให้ AI สามารถมองเห็นใบหน้าขนาดเล็กที่อยู่แถวหลังได้
                    const detections = await faceapi.detectAllFaces(
                        currentImg, 
                        new faceapi.SsdMobilenetv1Options({ minConfidence: 0.25 })
                    ).withFaceLandmarks().withFaceDescriptors();

                    for (let d of detections) {
                        const match = faceMatcher.findBestMatch(d.descriptor);
                        // ยืนยันว่าต้องเป็นบุคคลที่เราค้นหาเท่านั้น ไม่เอาบุคคลนิรนามอื่น ๆ ในห้องเรียน
                        if (match.label !== 'unknown') {
                            matchCount++;
                            const div = document.createElement('div');
                            div.className = 'bg-white p-2 rounded shadow transition hover:scale-105 duration-200';
                            div.innerHTML = `<img src="${imgUrl}" class="rounded w-full h-auto object-cover aspect-square" alt="ผลลัพธ์คัดกรอง">`;
                            gridPhotos.appendChild(div);
                            resultSection.classList.remove('hidden');
                            break; // เมื่อเจอใบหน้าเราในรูปนั้นแล้ว ให้ข้ามไปตรวจรูปถัดไปทันทีเพื่อความเร็ว
                        }
                    }
                } catch (err) {
                    console.log('ข้ามไฟล์รูปภาพชั่วคราว:', err);
                }
            }

            if (matchCount === 0) {
                statusText.innerText = '❌ AI คัดกรองอย่างละเอียดครบถ้วนแล้ว ไม่พบภาพใบหน้าของนายในคลังระบบนี้ครับ';
            } else {
                statusText.innerText = `🎉 สำเร็จ! AI ค้นพบรูปภาพกิจกรรมที่มีใบหน้าของนายรวมทั้งหมด ${matchCount} รูปครับ`;
            }
        });

        window.onload = initAI;
    </script>
