<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - AI Face Recognition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Prompt', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-slate-800/80 border border-slate-700/80 rounded-2xl p-8 shadow-2xl backdrop-blur-md">
        <div class="text-center space-y-3 mb-8">
            <div class="inline-flex p-3 bg-blue-600/20 text-blue-400 rounded-2xl border border-blue-500/30">
                <i data-lucide="shield-check" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">เข้าสู่ระบบใช้งาน</h1>
            <p class="text-xs text-slate-400">ระบบค้นหาและสแกนใบหน้ากิจกรรมโรงเรียน</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-rose-500/10 border border-rose-500/30 text-rose-400 text-xs p-3 rounded-xl mb-6 text-center">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5">ชื่อผู้ใช้งาน (Username)</label>
                <div class="relative">
                    <i data-lucide="user" class="w-5 h-5 text-slate-500 absolute left-3 top-3"></i>
                    <input type="text" name="username" required placeholder="admin หรือ student"
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-blue-500 text-white transition">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-slate-300 mb-1.5">รหัสผ่าน (Password)</label>
                <div class="relative">
                    <i data-lucide="key-round" class="w-5 h-5 text-slate-500 absolute left-3 top-3"></i>
                    <input type="password" name="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-4 py-2.5 bg-slate-900/60 border border-slate-700 rounded-xl text-sm focus:outline-none focus:border-blue-500 text-white transition">
                </div>
            </div>

            <button type="submit" 
                    class="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium text-sm rounded-xl shadow-lg shadow-blue-600/20 transition-all flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                เข้าสู่ระบบ
            </button>
        </form>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
